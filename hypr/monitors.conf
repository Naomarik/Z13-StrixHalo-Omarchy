# See https://wiki.hyprland.org/Configuring/Monitors/
# List current monitors and resolutions possible: hyprctl monitors
# Format: monitor = [port], resolution, position, scale

# Optimized for retina-class 2x displays, like 13" 2.8K, 27" 5K, 32" 6K.
env = GDK_SCALE,2
# monitor=eDP-1,2880x1800@180.00,0x0,2.00,bitdepth,10,vrr,1

# Double
monitor=eDP-1,2560x1600@180.00,384x1152,2.00,bitdepth,10,cm,srgb
#monitor=DP-2,2560x1440@239.96,0x0,1.25,cm,srgb  # cm,srgb prevents auto-HDR on fullscreen
monitor=DP-1,2560x1440@239.96,0x0,1.25,bitdepth,10,cm,srgb  # cm,srgb prevents auto-HDR on fullscreen

# monitor=DP-1,2560x1440@239.96,0x0,1.25,cm,srgb  # cm,srgb prevents auto-HDR on fullscreen
# 840x2160@60.00Hz 4096x2160@60.00Hz 4096x2160@59.94Hz 4096x2160@50.00Hz 4096x2160@30.00Hz 4096x2160@29.97Hz 4096x2160@25.00Hz 4096x2160@24.00Hz 4096x2160@23.98Hz 3840x2160@60.00Hz 3840x2160@60.00Hz 3840x2160@59.94Hz 3840x2160@59.94Hz 3840x2160@50.00Hz 3840x2160@50.00Hz 3840x2160@30.00Hz 3840x2160@29.97Hz 3840x2160@25.00Hz 3840x2160@24.00Hz 3840x2160@23.98Hz 1920x1080@120.00Hz 1920x1080@119.88Hz 1920x1080@100.00Hz 1920x1080@60.00Hz 1920x1080@60.00Hz 1920x1080@59.94Hz 1920x1080@50.00Hz 1920x1080@30.00Hz 1920x1080@29.97Hz 1920x1080@25.00Hz 1920x1080@24

# Single
#monitor=eDP-2,2560x1600@180.00,0x0,2.00,bitdepth,10

# External
#monitor=eDP-1,disable
#monitor=DP-1,2560x1440@239.96,0x0,1.25



