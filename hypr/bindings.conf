exec-once = hyprpm reload -n
bindd = SUPER ALT, RETURN, Tmux, exec, uwsm-app -- xdg-terminal-exec --dir="$(omarchy-cmd-terminal-cwd)" tmux new

general {
    layout = hy3
}

$terminal = uwsm-app -- xdg-terminal-exec
$browser = omarchy-launch-browser
bindd = SUPER, F1, Show key bindings, exec, omarchy-menu-keybindings

bindd = SUPER, RETURN, Terminal, exec, $terminal --dir="$(omarchy-cmd-terminal-cwd)"
bindd = SUPER SHIFT, RETURN, Browser, exec, omarchy-launch-browser
bindd = ALT SHIFT, XF86TouchpadOff, Wayscriber (Copilot key), exec, wayscriber
bindd = SUPER SHIFT, F, Toggle top bar, exec, omarchy-toggle-waybar
bindd = SUPER SHIFT, B, Browser, exec, uwsm-app -- google-chrome-stable --new-window "about:blank"
bindd = SUPER SHIFT ALT, B, Browser (private), exec, $browser --private

# Nice bindings that can be rebound
#bindd = SUPER SHIFT, M, Music, exec, omarchy-launch-or-focus spotify
#bindd = SUPER SHIFT, N, Editor, exec, omarchy-launch-editor
#bindd = SUPER SHIFT, T, Activity, exec, omarchy-launch-tui btop
#bindd = SUPER SHIFT, D, Docker, exec, omarchy-launch-tui lazydocker
#bindd = SUPER SHIFT, G, Signal, exec, omarchy-launch-or-focus signal "uwsm-app -- signal-desktop"
#bindd = SUPER SHIFT, O, Obsidian, exec, omarchy-launch-or-focus "^obsidian$" "uwsm-app -- obsidian -disable-gpu --enable-wayland-ime"
## SUPER SHIFT W - unbound (previously Typora, now used for zoom)
#bindd = SUPER SHIFT, SLASH, Passwords, exec, uwsm-app -- 1password

# If your web app url contains #, type it as ## to prevent hyprland treating it as a comment
#bindd = SUPER SHIFT, A, ChatGPT, exec, omarchy-launch-webapp "https://chatgpt.com"
#bindd = SUPER SHIFT ALT, A, Grok, exec, omarchy-launch-webapp "https://grok.com"
#bindd = SUPER SHIFT, Y, YouTube, exec, omarchy-launch-webapp "https://youtube.com/"
#bindd = SUPER SHIFT ALT, G, WhatsApp, exec, omarchy-launch-or-focus-webapp WhatsApp "https://web.whatsapp.com/"
#bindd = SUPER SHIFT CTRL, G, Google Messages, exec, omarchy-launch-or-focus-webapp "Google Messages" "https://messages.google.com/web/conversations"
#bindd = SUPER SHIFT, P, Google Photos, exec, omarchy-launch-or-focus-webapp "Google Photos" "https://photos.google.com/"
#bindd = SUPER SHIFT, X, X, exec, omarchy-launch-webapp "https://x.com/"
#bindd = SUPER SHIFT ALT, X, X Post, exec, omarchy-launch-webapp "https://x.com/compose/post"


# Unbind Omarchy defaults to allow custom usage
unbind = SUPER, K          # Allow custom keybinding (default: show key bindings)
unbind = SUPER, ESCAPE     # Allow custom keybinding (default: system menu)
unbind = SUPER, X          # Prevent SUPER+X from sending CTRL+X (allow s-x in Emacs)
unbind = SUPER CTRL, S  # share menu
unbind = SUPER CTRL, W  # wifi
unbind = SUPER CTRL, B  # useless battrery thing
unbind = SUPER CTRL, N  # nightlight thing i don't want

bindd = SUPER, F1, Show key bindings, exec, omarchy-menu-keybindings
bindd = SUPER ALT, ESCAPE, System menu, exec, omarchy-menu system
bind = SUPER, TAB, hy3:changegroup, toggletab
bind = SUPER, e, hy3:changegroup, opposite

# Splits and groups
# bind = SUPER, v, hy3:makegroup, v
bind = SUPER, h, hy3:makegroup, h
bind = SUPER, t, hy3:makegroup, tab

# Window management
bindd = SUPER SHIFT, SPACE, Toggle window mode (tile/float/sticky), exec, ~/.config/hypr/scripts/toggle-window-mode.sh
bindd = SUPER, F, Toggle fullscreen, fullscreen, 0
bind = SUPER, q, killactive

# Mouse bindings
bindm = SUPER, mouse:272, movewindow
bindm = SUPER, mouse:273, resizewindow
bind = SUPER, a, hy3:changefocus, raise
bind = SUPER, Escape, hy3:changefocus, lower

bind = SUPER, j, hy3:movefocus, l
bind = SUPER, k, hy3:movefocus, u
bind = SUPER, l, hy3:movefocus, d
bind = SUPER, SEMICOLON, hy3:movefocus, r

bind = SUPER+SHIFT, j, hy3:movewindow, l, once
bind = SUPER+SHIFT, k, hy3:movewindow, u, once
bind = SUPER+SHIFT, l, hy3:movewindow, d, once
bind = SUPER+SHIFT, SEMICOLON, hy3:movewindow, r, once

bindd = SUPER, down, Decrease brightness, exec, ~/.config/hypr/scripts/brightness-change.sh -5
bindd = SUPER, up, Increase brightness, exec, ~/.config/hypr/scripts/brightness-change.sh +5

bindd = SUPER CTRL, down, Decrease volume, exec, swayosd-client --output-volume lower
bindd = SUPER CTRL, up, Increase volume, exec, swayosd-client --output-volume raise

bindd = , XF86KbdLightOnOff, Toggle keyboard brightness, exec, ~/.config/hypr/scripts/toggle-kbd-backlight.sh
bindd = , XF86Launch3, Toggle monitor mode (Double/External), exec, ~/.config/hypr/scripts/toggle-monitors.sh

bind = SUPER+SHIFT, left, hy3:movewindow, l, once
bind = SUPER+SHIFT, right, hy3:movewindow, r, once
bind = SUPER+SHIFT, down, hy3:movewindow, d, once
bind = SUPER+SHIFT, up, hy3:movewindow, u, once

# Workspace bindings
bind = SUPER, 1, workspace, 1
bind = SUPER, 2, workspace, 2
bind = SUPER, 3, workspace, 3
bind = SUPER, 4, workspace, 4
bind = SUPER, 5, workspace, 5
bind = SUPER, 6, workspace, 6
bind = SUPER, 7, workspace, 7
bind = SUPER, 8, workspace, 8
bind = SUPER, 9, workspace, 9
bind = SUPER, 0, workspace, 10

# Move window to workspace (silently, without following)
bind = SUPER+SHIFT, 1, movetoworkspacesilent, 1
bind = SUPER+SHIFT, 2, movetoworkspacesilent, 2
bind = SUPER+SHIFT, 3, movetoworkspacesilent, 3
bind = SUPER+SHIFT, 4, movetoworkspacesilent, 4
bind = SUPER+SHIFT, 5, movetoworkspacesilent, 5
bind = SUPER+SHIFT, 6, movetoworkspacesilent, 6
bind = SUPER+SHIFT, 7, movetoworkspacesilent, 7
bind = SUPER+SHIFT, 8, movetoworkspacesilent, 8
bind = SUPER+SHIFT, 9, movetoworkspacesilent, 9
bind = SUPER+SHIFT, 0, movetoworkspacesilent, 10

bindd = SUPER, EQUAL, Grow current window, resizeactive, 40 40
bindd = SUPER, MINUS, Shrink current window, resizeactive, -40 -40

# macOS-style system-wide zoom (Super+Alt+= to zoom in, Super+Alt+- to zoom out)
bindd = SUPER ALT, EQUAL, Zoom in, exec, hyprctl keyword cursor:zoom_rigid true && hyprctl keyword cursor:zoom_factor "$(hyprctl getoption cursor:zoom_factor -j | jq -r '.float' | awk '{print ($1 < 3.0 ? $1 + 0.5 : 3.0)}')"
bindd = SUPER ALT, MINUS, Zoom out, exec, hyprctl keyword cursor:zoom_rigid true && hyprctl keyword cursor:zoom_factor "$(hyprctl getoption cursor:zoom_factor -j | jq -r '.float' | awk '{print ($1 > 1.0 ? $1 - 0.5 : 1.0)}')"
bindd = SUPER ALT, 0, Reset zoom, exec, hyprctl keyword cursor:zoom_factor 1.0

bindd = SUPER CTRL, W, Zoom in, exec, hyprctl keyword cursor:zoom_rigid true && hyprctl keyword cursor:zoom_factor "$(hyprctl getoption cursor:zoom_factor -j | jq -r '.float' | awk '{print ($1 < 3.0 ? $1 + 1.0 : 6.0)}')"
bindd = SUPER CTRL, S, Zoom out, exec, hyprctl keyword cursor:zoom_rigid true && hyprctl keyword cursor:zoom_factor "$(hyprctl getoption cursor:zoom_factor -j | jq -r '.float' | awk '{print ($1 > 1.0 ? $1 - 1.0 : 1.0)}')"
bindd = SUPER CTRL, F, Reset zoom, exec, hyprctl keyword cursor:zoom_factor 1.0

# Voice dictation - Super+Q for record-then-transcribe, Super+D for live streaming
bindd = SUPER, d, Voice dictation (toggle), exec, ~/.config/hypr/scripts/dictate.sh

# Screenshot
bindd = ALT SHIFT, S, Screenshot, exec, omarchy-cmd-screenshot
bindd = ALT SHIFT CTRL, S, Screen recording, exec, omarchy-cmd-screenrecord

# Workspace rename (empty input reverts to number)
bindd = SUPER, F2, Rename workspace, exec, ~/.config/hypr/scripts/rename-workspace.sh
bindd = SUPER, F3, Swap workspace position, exec, ~/.config/hypr/scripts/swap-workspace.sh

# Gaming

## Backend SDL (not sure what this is) and full res
# bindd = SUPER, F2, Steam Big Picture, exec, [workspace 5] gamescope --backend sdl -W 2880 -H 1800 -r 120 --adaptive-sync --steam --force-grab-cursor -f -- steam -gamepadui
bindd = SUPER, F5, Steam Big Picture, exec, [workspace 5] bash -c 'env MANGOHUD=1 gamescope -W 2560 -H 1600 -r 180 --adaptive-sync --steam --force-grab-cursor -f -- steam -gamepadui; pkill -f "Decky Loader" 2>/dev/null; sudo -n rm -f /run/systemd/system/{suspend,sleep,hibernate,hybrid-sleep}.target; sudo -n systemctl daemon-reload'
bindd = SUPER, F6, Steam Big Picture, exec, [workspace 5] bash -c 'env MANGOHUD=1 gamescope -W 2560 -H 1440 -r 239.96 --adaptive-sync --steam --force-grab-cursor -f -- steam -gamepadui; pkill -f "Decky Loader" 2>/dev/null; sudo -n rm -f /run/systemd/system/{suspend,sleep,hibernate,hybrid-sleep}.target; sudo -n systemctl daemon-reload'
bindd = SUPER, F7, Steam Big Picture, exec, [workspace 5] bash -c 'env MANGOHUD=1 gamescope -W 3840 -H 2160 -r 60 --adaptive-sync --steam --force-grab-cursor -f -- steam -gamepadui; pkill -f "Decky Loader" 2>/dev/null; sudo -n rm -f /run/systemd/system/{suspend,sleep,hibernate,hybrid-sleep}.target; sudo -n systemctl daemon-reload'

# LSFG Configuration Overlay (toggle)
bindd = SUPER SHIFT, DELETE, LSFG Config (Frame Gen), exec, ~/.config/hypr/scripts/toggle-lsfg-overlay.sh

# MangoHud FPS Limiter with Notification (cycles: OFF→30→40→60→120→OFF)
# FPS Limiter - DISABLED (MangoHud limiter not working)
# Use TUI (SUPER+SHIFT+DELETE) to adjust DXVK_FRAME_RATE instead
# bindd = SUPER SHIFT, F11, Cycle FPS Limit, exec, ~/.config/hypr/scripts/mangohud-fps-notify.sh cycle


# Custom key remapping

plugin {
    hy3 {
      no_gaps_when_only = 1

      tabs {
        padding = 0
        radius = 0
        border_width = 1
      }

      autotile {
          enable = true
          trigger_width = 300
          triger_heigth = 500
        }
    }
}


bindd = SUPER SHIFT, F5, Gaming Mode, exec, /usr/local/bin/switch-to-gaming
